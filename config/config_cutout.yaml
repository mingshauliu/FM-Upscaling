# ============================================================
# pipeline_v3 — single config for training + inference
# ============================================================
# Switch experiments by editing this file (or copy & rename).
# Rules:
#   circular_padding: true  → full periodic box only
#   circular_padding: false → cropouts (boundaries not periodic)

# ---- data ----
data:
  cdm_path: /mnt/home/mliu1/ceph/CAMELS-L50n512/cached/Grids_Mcdm_IllustrisTNG_SB35_256_z=0.0_log1p_normed.npy
  gas_path: /mnt/home/mliu1/ceph/CAMELS-L50n512/cached/Grids_Mgas_IllustrisTNG_SB35_256_z=0.0_log1p_normed.npy
  param_path: /mnt/home/mliu1/ceph/CAMELS-L50n512/cached/param_IllustrisTNG_SB35_L50n512_normed.txt
  resolution: 256          # native grid size (128 for L25, 256 for L50)
  crop_size: 128          # null = no crop; set < resolution for PBC random crop
  box_size: 50             # Mpc/h
  val_split: 0.2

# ---- model ----
model:
  in_channels: 2           # [x_t, cdm]
  base_channels: 128
  out_channels: 1
  param_dim: 35             # columns in param_path
  circular_padding: false
  num_blocks: 2            # ResBlocks per encoder/decoder level

# ---- training ----
training:
  max_epochs: 1000
  batch_size: 2
  noise_std: 0.2
  lr: 3.0e-4
  weight_decay: 1.0e-3
  gradient_checkpointing: false
  gradient_clip: 1.0
  accumulate_grad: 4
  precision: "bf16-mixed"  # 16-mixed | bf16-mixed | 32
  devices: 4
  strategy: ddp
  num_workers: 2
  log_every_n_steps: 50
  xcorr_every_n_epochs: 5
  xcorr_num_steps: 50
  xcorr_method: euler      # euler | dopri5 | dopri8 | rk4 | midpoint | ...
  xcorr_rtol: 1.0e-4       # for adaptive solvers only
  xcorr_atol: 1.0e-4       # for adaptive solvers only
  resume_from: null        # checkpoint path to resume

# ---- inference ----
inference:
  checkpoint: null         # null = auto-detect best from lightning_logs/
  num_steps: 100           # integration steps (fixed-step) or time points (adaptive)
  method: dopri5            # euler | dopri5 | dopri8 | rk4 | midpoint | ...
  rtol: 1.0e-4             # for adaptive solvers only
  atol: 1.0e-4             # for adaptive solvers only
  num_gpus: 4
  output_dir: outputs/synth

  sources:
    - name: L50_cutout
      cdm_path: /mnt/home/mliu1/ceph/CAMELS-L50n512/cached/Grids_Mcdm_IllustrisTNG_SB35_256_z=0.0_log1p_normed.npy
      gas_path: /mnt/home/mliu1/ceph/CAMELS-L50n512/cached/Grids_Mgas_IllustrisTNG_SB35_256_z=0.0_log1p_normed.npy
      param_path: /mnt/home/mliu1/ceph/CAMELS-L50n512/cached/param_IllustrisTNG_SB35_L50n512_normed.txt
      box_size: 50
      resolution: 256
      crop_size: 128      # null = full grid
      n_samples: null      # null = all
      n_stochastic: 1
